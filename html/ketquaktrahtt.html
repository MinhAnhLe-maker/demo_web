<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Kiểm Tra Hình Trụ Tròn</title>
    <link rel="stylesheet" href="../css/ketquakthhcn.css">

    <script>
      window.MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- CÔ LẬP LOCALSTORAGE CHO CHỦ ĐỀ htt -->
    <script>
      (function() {
        const topicId = "htt";
        const targetKeys = ["daNopBaiTrangThai", "dangXemLai", "mangDapAnNguoiDung", "diemTracNghiem", "tongSoCau"];
        const originalGetItem = localStorage.getItem.bind(localStorage);
        const originalSetItem = localStorage.setItem.bind(localStorage);
        const originalRemoveItem = localStorage.removeItem.bind(localStorage);

        localStorage.getItem = function(key) {
          if (targetKeys.includes(key)) {
            return originalGetItem(topicId + "_" + key);
          }
          return originalGetItem(key);
        };

        localStorage.setItem = function(key, value) {
          if (targetKeys.includes(key)) {
            return originalSetItem(topicId + "_" + key, value);
          }
          return originalSetItem(key, value);
        };

        localStorage.removeItem = function(key) {
          if (targetKeys.includes(key)) {
            return originalRemoveItem(topicId + "_" + key);
          }
          return originalRemoveItem(key);
        };
      })();
    </script>
</head>
<body>

    <div class="result-box">
        <h2>KẾT QUẢ BÀI LÀM: HÌNH TRỤ TRÒN</h2>
        <div class="score-display" id="score-text">0 / 20</div>
        <div class="evaluation" id="evaluation-text">Đang tải kết quả...</div>
        
        <div class="button-group" style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button class="btn-review" onclick="xemLaiBai()" style="cursor: pointer;">Xem lại bài</button>
            <button class="btn-retry" onclick="lamLai()" style="background-color: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Làm lại</button>
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const diemSo = localStorage.getItem("diemTracNghiem") || 0;
        const tongSoCau = localStorage.getItem("tongSoCau") || 20;

        // --- PHẦN HIỂN THỊ XU ---
        // Tính xu: 20 xu/câu đúng + 100 xu thưởng nếu full điểm
        let xuNhanDuoc = diemSo * 20;
        if (diemSo === 20) {
            xuNhanDuoc += 100;
        }

        const scoreElement = document.getElementById("score-text");
        if (scoreElement) {
            scoreElement.innerHTML = `${diemSo} / ${tongSoCau} <br> 
            <span style="color: #f39c12; font-size: 0.5em;">💰 Nhận được: ${xuNhanDuoc} xu</span>`;
        }
        

        let nhanXet = "";
        const diem = parseInt(diemSo);
        const tong = parseInt(tongSoCau);
        
        if (diem === tong) {
            nhanXet = "Xuất sắc! Bạn đạt điểm tuyệt đối 100% về Hình Trụ Tròn! 🌟";
        } else if (diem >= 16) {
            nhanXet = "Rất tốt! Kiến thức hình học khối trụ của bạn rất vững chắc! 👍";
        } else if (diem >= 10) {
            nhanXet = "Khá tốt! Bạn đã vượt qua bài kiểm tra ở mức Đạt. 😊";
        } else {
            // Sửa lỗi chính tả chữ Pi và bổ sung định dạng toán học chuẩn
            nhanXet = "Cần cố gắng thêm nhé! Hãy xem lại bài làm để rà soát công thức tính số Pi ($\pi$). 💪";
        }

        const evaluationElement = document.getElementById("evaluation-text");
        if (evaluationElement) {
            // Đổi từ innerText sang innerHTML để hiển thị ký hiệu MathJax mượt mà
            evaluationElement.innerHTML = nhanXet;
        }

        // Gọi MathJax load lại ký hiệu sau khi chèn text mới vào
        if (window.MathJax && window.MathJax.typeset) {
            window.MathJax.typeset();
        }
    });

    // --- BỔ SUNG LÒNG HÀM XỬ LÝ SỰ KIỆN CHO 2 NÚT BẤM KHÔNG BỊ LỖI ĐƠ ---
    function xemLaiBai() {
        localStorage.setItem("dangXemLai", "true");
        localStorage.setItem("daNopBaiTrangThai", "true");
        window.location.href = "kiemtrahtt.html"; // Quay lại đúng trang làm bài hình trụ tròn
    }

    function lamLai() {
        localStorage.setItem("dangXemLai", "false");
        localStorage.setItem("daNopBaiTrangThai", "false");
        localStorage.removeItem("mangDapAnNguoiDung");
        window.location.href = "kiemtrahtt.html"; // Khởi động làm lại từ đầu
    }
    </script>

</body>
</html>
