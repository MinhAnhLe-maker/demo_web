<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Toán 247</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

    <div class="login-card">
        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Quay lại trang chủ
        </a>

        <div class="login-header">
            <img src="https://cdn-icons-png.flaticon.com/512/3413/3413535.png" class="sticker-book" alt="Book Icon">
            <h1>Chào mừng trở lại!</h1>
            
        </div>

        <button class="google-btn" id="btnGoogleLogin">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google Logo">
            <span>Đăng nhập với Google</span>
        </button>

        <div class="divider"><span>Hoặc dùng tài khoản</span></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="VD: name@example.com" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu của bạn" required>
            </div>
            <button type="submit" class="login-submit">Đăng nhập</button>
        </form>

        <div class="register-link-text">
            Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
</body>
</html>
